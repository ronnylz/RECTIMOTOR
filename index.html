<style>

    --panel:#20242b;
    --panel-alt:#282d36;
    --border:#383e48;
    --text:#ecebe7;
    --text-dim:#9aa2ad;
    --accent:#63a0bd;

    --warn:#d18f3a;

    --success:#74a978;
    --radius:10px;
    --radius-sm:7px;
    --shadow:0 2px 10px rgba(0,0,0,.28);
    --shadow-lift:0 8px 24px rgba(0,0,0,.38);
    --mono:'IBM Plex Mono',monospace;
    --sans:'IBM Plex Sans',sans-serif;

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:var(--sans);height:100%;}
  #app{display:flex;min-height:100vh;}
  ::-webkit-scrollbar{width:10px;height:10px;}
  ::-webkit-scrollbar-track{background:var(--bg);}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:5px;}

  /* Sidebar */
  .sidebar{width:224px;min-width:224px;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:20px 0;}
  .brand{padding:0 20px 20px 20px;border-bottom:1px solid var(--border);margin-bottom:14px;}
  .brand-mark{font-family:var(--mono);font-weight:700;font-size:19px;letter-spacing:0.5px;color:var(--text);}
  .brand-mark span{color:var(--accent);}
  .brand-sub{font-size:11px;color:var(--text-dim);letter-spacing:1.5px;text-transform:uppercase;margin-top:4px;}
  .nav-item{display:flex;align-items:center;gap:10px;margin:2px 10px;padding:10px 12px;border-radius:var(--radius-sm);color:var(--text-dim);cursor:pointer;font-size:14px;font-weight:500;transition:background .15s ease,color .15s ease,transform .1s ease;}
  .nav-item:hover{color:var(--text);background:var(--panel-alt);}
  .nav-item.active{color:var(--text);background:linear-gradient(90deg,var(--accent-dim),rgba(91,143,168,.14));box-shadow:var(--shadow);}
  .nav-item:active{transform:scale(.98);}
  .nav-icon{font-family:var(--mono);font-size:13px;width:16px;text-align:center;color:var(--accent);}
  .sidebar-footer{margin-top:auto;padding:14px 20px 0 20px;border-top:1px solid var(--border);font-size:11px;color:var(--text-dim);}
  .sync-status{margin-bottom:8px;}
  .reset-link{color:var(--danger);cursor:pointer;text-decoration:underline;font-size:11px;transition:opacity .15s;}
  .reset-link:hover{opacity:.8;}

  /* Main */
  .main{flex:1;display:flex;flex-direction:column;min-width:0;}
  .topbar{padding:18px 28px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;background:rgba(32,36,43,.5);backdrop-filter:blur(6px);position:sticky;top:0;z-index:5;}
  .topbar h1{font-size:18px;margin:0;font-weight:600;letter-spacing:.2px;}
  .topbar .date{font-family:var(--mono);color:var(--text-dim);font-size:13px;}
  .topbar-logo{height:30px;max-width:100px;object-fit:contain;border-radius:5px;}
  .content{padding:24px 28px;overflow-y:auto;flex:1;}

  /* KPI cards */
  .kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:24px;}
  .kpi-card{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow);transition:transform .15s ease,box-shadow .15s ease;}
  .kpi-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-lift);}
  .kpi-label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--text-dim);margin-bottom:8px;}
  .kpi-value{font-family:var(--mono);font-size:26px;font-weight:600;}
  .kpi-value.warn{color:var(--warn);}
  .kpi-value.accent{color:var(--accent);}

  h2.section-title{font-size:13px;text-transform:uppercase;letter-spacing:1px;color:var(--text-dim);margin:0 0 12px 0;font-weight:600;}

  /* Buttons */
  .btn{font-family:var(--sans);font-size:13px;font-weight:600;padding:9px 16px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--panel-alt);color:var(--text);cursor:pointer;transition:border-color .12s,background .12s,transform .08s;}
  .btn:hover{border-color:var(--accent);}
  .btn:active{transform:scale(.97);}
  .btn-primary{background:linear-gradient(180deg,var(--accent),var(--accent-dim));border-color:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(91,143,168,.35);}

  .btn-danger{border-color:var(--danger);color:var(--danger);background:transparent;}

  .btn-sm{padding:5px 10px;font-size:12px;}
  .btn-icon{background:transparent;border:none;color:var(--text-dim);cursor:pointer;font-size:14px;padding:4px 6px;border-radius:5px;transition:background .12s,color .12s;}

  /* Order plate (signature element) */

  .order-card:hover{box-shadow:var(--shadow-lift);}
  .plate{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:linear-gradient(180deg,#2d323a,#262a30);border-bottom:1px solid var(--border);cursor:pointer;position:relative;}
  .plate::before,.plate::after{content:'';position:absolute;width:5px;height:5px;border-radius:50%;background:#494f59;box-shadow:inset 0 1px 1px #000;top:8px;}
  .plate::before{left:8px;}
  .plate::after{right:8px;}

  .plate-folio span{color:var(--text-dim);font-weight:400;font-size:12px;margin-left:10px;}
  .status-badge{font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;text-transform:uppercase;letter-spacing:0.5px;font-family:var(--mono);}
  .status-pendiente{background:#3a414c;color:var(--text-dim);}
  .status-en_proceso{background:rgba(91,143,168,.18);color:var(--accent);border:1px solid var(--accent-dim);}
  .status-terminado{background:rgba(107,155,110,.18);color:var(--success);border:1px solid var(--success);}
  .status-entregado{background:rgba(107,155,110,.35);color:var(--success);border:1px solid var(--success);}
  .order-body{padding:14px 16px;display:none;}
  .order-body.open{display:block;}

  .order-meta div span{display:block;color:var(--text-dim);font-size:10px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px;}
  .work-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}

  table{width:100%;border-collapse:collapse;font-size:13px;}
  th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--text-dim);padding:8px 10px;border-bottom:1px solid var(--border);font-weight:600;}

  .table-wrap{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);}

  .empty-state{text-align:center;padding:50px 20px;color:var(--text-dim);}
  .empty-state .big{font-size:15px;color:var(--text);margin-bottom:6px;}

  /* Modal */
  .modal-backdrop{position:fixed;inset:0;background:rgba(10,11,13,.6);backdrop-filter:blur(2px);display:flex;align-items:flex-start;justify-content:center;padding:30px 16px;z-index:50;overflow-y:auto;animation:fadeIn .15s ease;}
  .modal{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);width:100%;max-width:820px;padding:22px 26px;margin-bottom:40px;box-shadow:var(--shadow-lift);animation:riseIn .18s ease;}

  @keyframes riseIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;}
  .form-grid.cols-4{grid-template-columns:repeat(4,1fr);}
  label{display:block;font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;}
  input,select,textarea{width:100%;background:var(--panel-alt);border:1px solid var(--border);color:var(--text);border-radius:var(--radius-sm);padding:9px 10px;font-size:13px;font-family:var(--sans);transition:border-color .12s,box-shadow .12s;}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(99,160,189,.18);}
  textarea{resize:vertical;min-height:56px;}
  .field{margin-bottom:2px;}
  .divider{border:none;border-top:1px solid var(--border);margin:16px 0;}
  .trabajo-block{border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;margin-bottom:10px;background:var(--panel-alt);}
  .trabajo-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
  .trabajo-head b{font-family:var(--mono);font-size:13px;color:var(--accent);}
  .proceso-row{display:grid;grid-template-columns:1.6fr 70px 90px 70px auto;gap:8px;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px;}
  .proceso-row:last-child{border-bottom:none;}
  .proceso-nombre{font-size:13px;}
  .time-display{font-family:var(--mono);font-size:12px;color:var(--text-dim);}
  .add-work-btns{display:flex;gap:8px;margin-bottom:10px;}
  .repuesto-row{display:grid;grid-template-columns:2fr 70px 90px 90px auto;gap:8px;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px;}
  .repuesto-add{display:grid;grid-template-columns:2fr 90px auto;gap:8px;align-items:end;margin-top:8px;}
  .totals{margin-top:10px;padding-top:10px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:26px;font-family:var(--mono);}
  .totals .t-label{color:var(--text-dim);font-size:11px;text-transform:uppercase;}
  .totals .t-value{font-size:16px;font-weight:700;}
  .modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:18px;}
  .close-x{position:absolute;top:16px;right:20px;cursor:pointer;color:var(--text-dim);font-size:18px;background:none;border:none;}
  .modal{position:relative;}
  .loading{padding:60px;text-align:center;color:var(--text-dim);font-family:var(--mono);}

  .photo-box{display:flex;align-items:center;gap:12px;margin-bottom:10px;padding:8px;background:var(--panel);border:1px dashed var(--border);border-radius:var(--radius);}
  .photo-thumb{width:56px;height:56px;object-fit:cover;border-radius:4px;cursor:pointer;border:1px solid var(--border);}
  .logo-thumb{width:56px;height:56px;object-fit:contain;border-radius:4px;border:1px solid var(--border);background:#fff;padding:4px;}
  .photo-actions{display:flex;gap:8px;}
  .file-btn{display:inline-block;text-align:center;}
  .photo-modal-img{max-width:100%;max-height:80vh;display:block;border-radius:var(--radius);}
  .pieza-row{display:flex;align-items:center;gap:14px;padding:12px 16px;border-bottom:1px solid var(--border);}
  .pieza-row:last-child{border-bottom:none;}
  .pieza-thumb{width:44px;height:44px;object-fit:cover;border-radius:4px;border:1px solid var(--border);cursor:pointer;flex-shrink:0;}
  .pieza-thumb-placeholder{width:44px;height:44px;border-radius:4px;border:1px dashed var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;color:var(--text-dim);font-size:16px;}
  .pieza-cajon{font-family:var(--mono);font-weight:700;color:var(--warn);font-size:14px;}
  .pieza-info{flex:1;min-width:0;font-size:13px;}
  .pieza-info .sub{color:var(--text-dim);font-size:12px;margin-top:2px;}
  .search-box{margin-bottom:14px;}
  .search-box input{font-size:14px;padding:11px 14px;}

  .auth-wrap{width:100%;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
  .auth-card{width:100%;max-width:360px;background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:28px 26px;box-shadow:var(--shadow-lift);animation:riseIn .2s ease;}
  .auth-logo{display:block;margin:0 auto 14px auto;max-height:64px;max-width:160px;object-fit:contain;}
  .auth-error{color:var(--danger);font-size:12px;min-height:16px;margin-bottom:8px;}
  .user-badge{font-size:12px;color:var(--text-dim);margin-bottom:6px;}
  .role-pill{font-family:var(--mono);font-size:10px;padding:2px 7px;border-radius:10px;text-transform:uppercase;background:var(--panel-alt);border:1px solid var(--border);color:var(--text-dim);}
  .role-pill.admin{color:var(--warn);border-color:var(--warn);}
</style>

<script>
/* ==== CONFIGURACIÓN DE EMAILJS (recuperación de contraseña por correo) ====
   Reemplaza estos 3 valores con los de tu cuenta gratuita en emailjs.com
   Mientras digan "TU_...", el botón de enviar por correo mostrará un aviso
   en vez de intentar enviar. */
const EMAILJS_PUBLIC_KEY  = 'TU_PUBLIC_KEY';
const EMAILJS_SERVICE_ID  = 'TU_SERVICE_ID';
const EMAILJS_TEMPLATE_ID = 'TU_TEMPLATE_ID';
const EMAILJS_CONFIGURADO = !EMAILJS_PUBLIC_KEY.startsWith('TU_') && !EMAILJS_SERVICE_ID.startsWith('TU_') && !EMAILJS_TEMPLATE_ID.startsWith('TU_');
if(EMAILJS_CONFIGURADO && window.emailjs){ window.emailjs.init(EMAILJS_PUBLIC_KEY); }

/* ==== CONFIGURACIÓN DE SUPABASE (multi-dispositivo con un solo servidor central) ====
   Si completas estos 2 valores con los de tu proyecto gratuito en supabase.com,
   TODOS los dispositivos que abran esta misma app verán los mismos datos en
   tiempo casi-real (en vez de que cada celular/PC guarde los suyos por separado).
   Mientras digan "TU_...", la app sigue funcionando en modo "cada dispositivo
   guarda lo suyo" (como hasta ahora). */
const SUPABASE_URL = 'https://usbnablmjmcmepueosmg.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVzYm5hYmxtam1jbWVwdWVvc21nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzMDgxODAsImV4cCI6MjA5ODg4NDE4MH0.J1H77BwPG2JHPYEvFtPzilMImKYK1JVitnagZb2Eyhc';
const SUPABASE_CONFIGURADO = !SUPABASE_URL.startsWith('TU_') && !SUPABASE_ANON_KEY.startsWith('TU_');
const SUPABASE_POLL_MS = 15000; // cada cuánto revisa cambios de otros dispositivos

const PREGUNTAS_SEGURIDAD = [
  '¿Cuál es el nombre de tu primera mascota?',
  '¿En qué ciudad naciste?',
  '¿Cuál es tu comida favorita?',
  '¿Cómo se llama tu mejor amigo de la infancia?',
  '¿Cuál fue el modelo de tu primer carro?'
];

const TIPOS_TRABAJO = {
  culata:{ label:'Cabezotes', procesos:['Prueba de fisuras','Planificado de superficie','Rectificado de asientos de válvulas','Cambio de guías','Ajuste de resortes de válvula'] },
  cigueñal:{ label:'Cigüeñal', procesos:['Rectificado de muñones de biela','Rectificado de muñones de bancada','Pulido final','Balanceo dinámico'] },
  bloque:{ label:'Bloque', procesos:['Rectificado de cilindros (bore)','Honing','Planificado de superficie','Cambio de camisas','Alineado de bancada'] }
};
const ESTADOS_OT = ['pendiente','en_proceso','terminado','entregado'];
const ESTADO_LABEL = {pendiente:'Pendiente', en_proceso:'En proceso', terminado:'Terminado', entregado:'Entregado'};

/* Prioridad de almacenamiento:
   1) window.storage nativo de Claude.ai (solo mientras se previsualiza aquí)
   2) Supabase, si SUPABASE_URL/SUPABASE_ANON_KEY están configurados -> multi-dispositivo real
   3) localStorage del navegador -> cada dispositivo guarda lo suyo (modo actual) */
function installSupabaseStorage(){
  const base = SUPABASE_URL.replace(/\/$/,'') + '/rest/v1/rectimotor_data';
  const readHeaders = () => ({
    'apikey': SUPABASE_ANON_KEY,
    'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
    'Content-Type': 'application/json'
  });
  // Escritura: si hay sesión (login exitoso contra Supabase Auth), usamos ese token.
  // Si no, cae al anon key, que la política de la base de datos ahora rechaza (así protegemos escritura/borrado).
  const writeHeaders = () => ({
    'apikey': SUPABASE_ANON_KEY,
    'Authorization': 'Bearer ' + (state.supabaseAccessToken || SUPABASE_ANON_KEY),
    'Content-Type': 'application/json'
  });
  window.storage = {
    async get(key){
      const res = await fetch(base + '?key=eq.' + encodeURIComponent(key) + '&select=value', {headers: readHeaders()});
      if(!res.ok) throw new Error('Error de red leyendo ' + key);
      const rows = await res.json();
      if(!rows.length) throw new Error('no encontrado');
      return {key, value: rows[0].value, shared:false};
    },
    async set(key, value){
      const res = await fetch(base, {
        method:'POST',
        headers: Object.assign(writeHeaders(), {'Prefer':'resolution=merge-duplicates'}),
        body: JSON.stringify({key, value, updated_at: new Date().toISOString()})
      });
      if(!res.ok) throw new Error('sin_permiso_' + res.status + '_guardando_' + key);
      return {key, value, shared:false};
    },
    async delete(key){
      const res = await fetch(base + '?key=eq.' + encodeURIComponent(key), {method:'DELETE', headers: writeHeaders()});
      if(!res.ok) throw new Error('sin_permiso_' + res.status + '_borrando_' + key);
      return {key, deleted:true, shared:false};
    },
    async list(prefix){
      const url = base + '?select=key' + (prefix ? ('&key=like.' + encodeURIComponent(prefix) + '*') : '');
      const res = await fetch(url, {headers: readHeaders()});
      if(!res.ok) throw new Error('Error de red listando llaves');
      const rows = await res.json();
      return {keys: rows.map(r=>r.key)};
    }
  };
}

let _ultimoAvisoPermiso = 0;
function handleStorageError(e, accion){
  console.error('Error ' + accion, e);
  const msg = (e && e.message) || '';
  const esPermiso = msg.includes('sin_permiso_401') || msg.includes('sin_permiso_403');
  const ahora = Date.now();
  if(ahora - _ultimoAvisoPermiso < 4000) return; // evita varias alertas seguidas
  _ultimoAvisoPermiso = ahora;
  if(esPermiso){
    alert('No se pudo guardar en la nube (' + accion + '): tu cuenta no tiene permiso de escritura configurado en Supabase. Pide a tu administrador que cree tu acceso en el panel de Supabase (Authentication → Users), o cierra sesión y vuelve a entrar si ya te lo configuraron.');
  } else {
    alert('No se pudo guardar en la nube (' + accion + '). Revisa tu conexión a internet e intenta de nuevo.');
  }
}

/* Convierte el "usuario" de la app en un correo sintético para Supabase Auth.
   No necesita ser un correo real: solo sirve como identificador único de la cuenta. */
function usuarioToSyntheticEmail(usuario){
  const limpio = (usuario||'').toLowerCase().trim().replace(/[^a-z0-9._-]/g,'');
  return limpio + '@rectimotor.local';
}

/* Intenta autenticar contra Supabase Auth para obtener permiso de ESCRITURA.
   Si falla, el usuario sigue pudiendo entrar a la app (login local normal) y ver
   los datos, pero no podrá guardar cambios hasta que un admin cree su cuenta
   en el panel de Supabase (Authentication → Users). */
async function supabaseAuthLogin(usuario, password){
  if(!SUPABASE_CONFIGURADO) return {ok:true};
  try{
    const res = await fetch(SUPABASE_URL.replace(/\/$/,'') + '/auth/v1/token?grant_type=password', {
      method:'POST',
      headers:{'Content-Type':'application/json', 'apikey': SUPABASE_ANON_KEY},
      body: JSON.stringify({ email: usuarioToSyntheticEmail(usuario), password })
    });
    const data = await res.json().catch(()=>null);
    if(!res.ok || !data || !data.access_token){ state.supabaseAccessToken=null; state.supabaseRefreshToken=null; return {ok:false}; }
    state.supabaseAccessToken = data.access_token;
    state.supabaseRefreshToken = data.refresh_token;
    return {ok:true};
  }catch(e){
    state.supabaseAccessToken=null; state.supabaseRefreshToken=null;
    return {ok:false};
  }
}

function installLocalStorageShim(){
  const PREFIX = 'rectimotor:';
  window.storage = {
    get(key){
      return Promise.resolve().then(()=>{
        const v = localStorage.getItem(PREFIX+key);
        if(v===null) throw new Error('no encontrado');
        return {key, value:v, shared:false};
      });
    },
    set(key,value){
      return Promise.resolve().then(()=>{
        localStorage.setItem(PREFIX+key, value);
        return {key, value, shared:false};
      });
    },
    delete(key){
      return Promise.resolve().then(()=>{
        localStorage.removeItem(PREFIX+key);
        return {key, deleted:true, shared:false};
      });
    },
    list(prefix){
      return Promise.resolve().then(()=>{
        const keys = [];
        for(let i=0;i<localStorage.length;i++){
          const k = localStorage.key(i);
          if(k && k.startsWith(PREFIX)){
            const bare = k.slice(PREFIX.length);
            if(!prefix || bare.startsWith(prefix)) keys.push(bare);
          }
        }
        return {keys};
      });
    }
  };
}

async function exportData(){
  const fotos = {};
  for(const o of state.orders){
    for(const t of o.trabajos){
      if(t.tieneFoto){
        try{
          const r = await window.storage.get('foto:'+t.id, false);
          if(r) fotos[t.id] = r.value;
        }catch(e){ /* sin foto guardada */ }
      }
    }
  }
  const payload = { app:'rectimotor', version:1, exportedAt:new Date().toISOString(), orders: state.orders, inventory: state.inventory, counters: state.counters, fotos };
  const blob = new Blob([JSON.stringify(payload)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'rectimotor-datos-' + todayStr() + '.json';
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
}

function handleImportFile(fileInputEl){
  if(!state.currentUser || state.currentUser.rol!=='admin'){ alert('Solo un usuario administrador puede importar datos.'); return; }
  const file = fileInputEl.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = async (e)=>{
    let payload;
    try{ payload = JSON.parse(e.target.result); }
    catch(err){ alert('El archivo no es un respaldo válido de RectiMotor.'); return; }
    if(!payload || !Array.isArray(payload.orders)){ alert('El archivo no tiene el formato esperado.'); return; }
    if(!confirm('Esto reemplazará los datos guardados en esta computadora con los del archivo importado. ¿Continuar?')) return;
    state.orders = payload.orders || [];
    state.inventory = payload.inventory || [];
    state.counters = payload.counters || {order:0};
    await saveOrders(); await saveInventory(); await saveCounters();
    if(payload.fotos){
      for(const [id, dataUrl] of Object.entries(payload.fotos)){
        try{ await window.storage.set('foto:'+id, dataUrl, false); }catch(err){ /* continua con las demás */ }
      }
    }
    state.photoCache = {}; state.pendingPhotos = {};
    fileInputEl.value = '';
    alert('Datos importados correctamente.');
    render();
  };
  reader.readAsText(file);
}

function orderTotal(o){
  const repSum = o.repuestos.reduce((a,r)=>a + r.cantidad*r.precioUnitario, 0);
  return repSum + (Number(o.manoObra)||0);
}
function orderSaldo(o){ return orderTotal(o) - (Number(o.abono)||0); }
function lowStockItems(){ return state.inventory.filter(i => Number(i.stock) <= Number(i.stockMinimo)); }

function diasEnTaller(o){
  const f = new Date((o.fechaIngreso||'')+'T00:00:00');
  if(isNaN(f.getTime())) return null;
  const hoy = new Date(todayStr()+'T00:00:00');
  return Math.round((hoy-f)/(1000*60*60*24));
}

function agingInfo(dias){
  if(dias===null) return null;
  if(dias>=90) return {label:dias+' días', color:'var(--danger)', urgente:true};
  if(dias>=60) return {label:dias+' días', color:'var(--danger)', urgente:false};
  if(dias>=30) return {label:dias+' días', color:'var(--warn)', urgente:false};
  return null;
}

function reparacionesAtrasadas(){
  return state.orders
    .filter(o=> o.estado!=='entregado')
    .map(o=>({order:o, dias: diasEnTaller(o)}))
    .filter(x=> x.dias!==null && x.dias>=30)
    .sort((a,b)=> b.dias - a.dias);
}

function generateOrderPDF(order){

  y += 6;
  doc.setDrawColor(200); doc.line(marginX, y, pageW-marginX, y); y += 8;

  doc.setFont('helvetica','bold'); doc.setFontSize(10);
  doc.text('Cliente', marginX, y);
  doc.text('Vehículo', pageW/2 + 4, y);
  y += 5;
  doc.setFont('helvetica','normal'); doc.setFontSize(9);
  doc.text(order.cliente.nombre || '—', marginX, y);
  doc.text([order.vehiculo.marca, order.vehiculo.modelo, order.vehiculo.anio].filter(Boolean).join(' '), pageW/2 + 4, y);
  y += 5;
  doc.text(order.cliente.telefono || '', marginX, y);
  doc.text(order.vehiculo.motor ? ('Motor: ' + order.vehiculo.motor) : '', pageW/2 + 4, y);
  y += 5;
  doc.text('Técnico: ' + (order.tecnico || '—'), marginX, y);
  doc.text('Cajón: ' + (order.ubicacion || '—'), pageW/2 + 4, y);
  y += 10;

  order.trabajos.forEach(t=>{
    if(y > 265){ doc.addPage(); y = 18; }
    doc.setFont('helvetica','bold'); doc.setFontSize(10);
    doc.setFillColor(235,235,235);
    doc.rect(marginX, y-4.5, pageW-marginX*2, 6.5, 'F');
    doc.text(TIPOS_TRABAJO[t.tipo].label + (t.ubicacion? '  ·  Cajón: '+t.ubicacion : ''), marginX+2, y);
    y += 7;
    doc.setFont('helvetica','normal'); doc.setFontSize(9);
    t.procesos.forEach(p=>{
      if(y > 270){ doc.addPage(); y = 18; }
      const estadoTxt = p.estado==='terminado' ? 'Terminado' : (p.estado==='en_proceso' ? 'En proceso' : 'Pendiente');
      doc.text('• ' + p.nombre, marginX+2, y);
      doc.text(estadoTxt, pageW - marginX - 30, y);
      doc.text(fmtSecs(p.tiempoRealSeg), pageW - marginX, y, {align:'right'});
      y += 5;
    });
    if(t.medidas){ doc.setFont('helvetica','italic'); doc.text('Medidas: ' + t.medidas, marginX+2, y); doc.setFont('helvetica','normal'); y += 6; }
    else y += 2;
  });

  if(order.repuestos.length){
    if(y > 250){ doc.addPage(); y = 18; }
    y += 4;
    doc.setFont('helvetica','bold'); doc.setFontSize(10);
    doc.setFillColor(235,235,235);
    doc.rect(marginX, y-4.5, pageW-marginX*2, 6.5, 'F');
    doc.text('Repuestos utilizados', marginX+2, y);
    y += 7;
    doc.setFont('helvetica','normal'); doc.setFontSize(9);
    order.repuestos.forEach(r=>{
      if(y > 270){ doc.addPage(); y = 18; }
      doc.text(r.nombre + ' x' + r.cantidad, marginX+2, y);
      doc.text(fmtMoney(r.cantidad*r.precioUnitario), pageW - marginX, y, {align:'right'});
      y += 5;
    });
  }

  y += 6;
  if(y > 265){ doc.addPage(); y = 18; }
  doc.setDrawColor(200); doc.line(marginX, y, pageW-marginX, y); y += 8;
  const repSubtotal = order.repuestos.reduce((a,r)=>a+r.cantidad*r.precioUnitario,0);
  doc.setFontSize(9);
  doc.text('Mano de obra:', pageW - marginX - 50, y);
  doc.text(fmtMoney(order.manoObra), pageW - marginX, y, {align:'right'}); y += 5;
  doc.text('Repuestos:', pageW - marginX - 50, y);
  doc.text(fmtMoney(repSubtotal), pageW - marginX, y, {align:'right'}); y += 6;
  doc.setFont('helvetica','bold'); doc.setFontSize(11);
  doc.text('Total:', pageW - marginX - 50, y);
  doc.text(fmtMoney(orderTotal(order)), pageW - marginX, y, {align:'right'});

  if(order.abono>0){
    y += 7;
    doc.setFont('helvetica','normal'); doc.setFontSize(9);
    doc.text('Abono recibido:', pageW - marginX - 50, y);
    doc.text('-' + fmtMoney(order.abono), pageW - marginX, y, {align:'right'}); y += 6;
    doc.setFont('helvetica','bold'); doc.setFontSize(11);
    doc.text('Saldo pendiente:', pageW - marginX - 50, y);
    doc.text(fmtMoney(orderSaldo(order)), pageW - marginX, y, {align:'right'});
  }

  if(order.notas){
    y += 10;
    if(y > 265){ doc.addPage(); y = 18; }
    doc.setFont('helvetica','bold'); doc.setFontSize(9);
    doc.text('Notas:', marginX, y); y += 5;
    doc.setFont('helvetica','normal');
    const lines = doc.splitTextToSize(order.notas, pageW - marginX*2);
    doc.text(lines, marginX, y);
  }

  doc.save('Orden-' + order.folio + '.pdf');
}

function normalizePhoneForWhatsapp(phone){
  let digits = (phone||'').replace(/\D/g,'');
  if(!digits) return null;
  if(digits.length <= 8 && state.taller.codigoPais){ digits = state.taller.codigoPais.replace(/\D/g,'') + digits; }
  return digits;
}

function notifyClientWhatsApp(order){
  const digits = normalizePhoneForWhatsapp(order.cliente.telefono);
  if(!digits){ alert('Esta orden no tiene un teléfono de cliente válido.'); return; }
  const vehiculo = [order.vehiculo.marca, order.vehiculo.modelo].filter(Boolean).join(' ');
  let mensaje;
  if(order.estado==='terminado' || order.estado==='entregado'){
    mensaje = `Hola ${order.cliente.nombre||''}, te escribimos de ${state.taller.nombre||'RectiMotor'} para avisarte que tu ${vehiculo||'vehículo'} (orden ${order.folio}) ya está listo para retirar. ¡Te esperamos!`;
  } else {
    mensaje = `Hola ${order.cliente.nombre||''}, te escribimos de ${state.taller.nombre||'RectiMotor'} sobre tu orden ${order.folio} (${vehiculo||'vehículo'}). Estado actual: ${ESTADO_LABEL[order.estado]}.`;
  }
  const url = 'https://wa.me/' + digits + '?text=' + encodeURIComponent(mensaje);
  window.open(url, '_blank');
}

}

function compressImageFile(file, callback){
  const reader = new FileReader();
  reader.onload = (e)=>{
    const img = new Image();
    img.onload = ()=>{
      const maxW = 640;
      const scale = Math.min(1, maxW / img.width);
      const canvas = document.createElement('canvas');
      canvas.width = Math.round(img.width*scale);
      canvas.height = Math.round(img.height*scale);
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      callback(canvas.toDataURL('image/jpeg', 0.72));
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function compressLogoFile(file, callback){
  const reader = new FileReader();
  reader.onload = (e)=>{
    const img = new Image();
    img.onload = ()=>{
      const maxW = 260;
      const scale = Math.min(1, maxW / img.width);
      const canvas = document.createElement('canvas');
      canvas.width = Math.round(img.width*scale);
      canvas.height = Math.round(img.height*scale);
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      callback(canvas.toDataURL('image/png')); // PNG conserva transparencia del logo
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

          ${state.taller.logo ? `<img src="${state.taller.logo}" class="topbar-logo">` : ''}
          <h1>${tabTitle()}</h1>
        </div>
        <div class="date">${new Date().toLocaleDateString('es-CR',{weekday:'long',day:'2-digit',month:'long',year:'numeric'})}</div>
      </div>
      <div class="content" id="content"></div>
    </div>
    ${state.modal ? renderModal() : ''}
  `;
  document.querySelectorAll('[data-nav]').forEach(el=>{
    el.onclick = ()=>{ state.tab = el.getAttribute('data-nav'); render(); };
  });
  const resetBtn = document.getElementById('reset-btn');
  if(resetBtn) resetBtn.onclick = onResetData;
  document.getElementById('export-btn').onclick = exportData;
  const importBtn = document.getElementById('import-btn');
  if(importBtn) importBtn.onclick = triggerImport;
  const importInput = document.getElementById('import-file-input');
  if(importInput) importInput.onchange = function(){ handleImportFile(this); };
  document.getElementById('logout-btn').onclick = logout;
  const syncBtn = document.getElementById('sync-now-btn');
  if(syncBtn) syncBtn.onclick = async ()=>{ syncBtn.textContent = '(actualizando…)'; await syncFromServer(); render(); };
  const tallerBtn = document.getElementById('taller-btn');
  if(tallerBtn) tallerBtn.onclick = ()=>{ state.modal = {type:'taller', draft: JSON.parse(JSON.stringify(state.taller))}; render(); };

  const content = document.getElementById('content');
  if(state.tab==='dashboard') content.innerHTML = renderDashboard();
  else if(state.tab==='orders') content.innerHTML = renderOrders();
  else if(state.tab==='search') content.innerHTML = renderSearch();
  else if(state.tab==='clientes') content.innerHTML = renderClientes();
  else if(state.tab==='inventory') content.innerHTML = renderInventory();
  else if(state.tab==='credito') content.innerHTML = state.currentUser.rol==='admin' ? renderCredito() : emptyState('Acceso restringido','Solo un administrador puede ver esta sección.');
  else if(state.tab==='reports') content.innerHTML = state.currentUser.rol==='admin' ? renderReports() : emptyState('Acceso restringido','Solo un administrador puede ver esta sección.');
  else if(state.tab==='users') content.innerHTML = state.currentUser.rol==='admin' ? renderUsers() : emptyState('Acceso restringido','Solo un administrador puede ver esta sección.');

  bindContentEvents();
  bindModalEvents();
}

function maskEmail(email){
  const [user, domain] = email.split('@');
  if(!domain) return email;
  const visible = user.slice(0,2);
  return visible + '***@' + domain;
}

function genTempPassword(){
  const chars = 'ABCDEFGHJKMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz23456789';
  let out = '';
  for(let i=0;i<8;i++) out += chars[Math.floor(Math.random()*chars.length)];
  return out;
}

async function sendRecoveryEmail(user){
  const errEl = document.getElementById('rc-error');
  if(!EMAILJS_CONFIGURADO || !window.emailjs){
    if(errEl) errEl.textContent = 'El envío de correo aún no está configurado en esta app. Usa la pregunta de seguridad o pide ayuda a un administrador.';
    return;
  }
  const btn = document.getElementById('rc-email-btn');
  if(btn){ btn.disabled = true; btn.textContent = 'Enviando…'; }
  const tempPass = genTempPassword();
  try{
    await window.emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
      to_email: user.correo,
      to_name: user.nombre,
      temp_password: tempPass
    });
    const idx = state.users.findIndex(u=>u.id===user.id);
    if(idx>=0){ state.users[idx].password = tempPass; await saveUsers(); }
    state.recovery = {step:'sent', usuario:user.usuario, user, error:''};
    render();
  }catch(e){
    console.error('Error enviando correo de recuperación', e);
    if(errEl) errEl.textContent = 'No se pudo enviar el correo. Verifica tu conexión o intenta con la pregunta de seguridad.';
    if(btn){ btn.disabled = false; btn.textContent = 'Enviarme una contraseña temporal a ' + maskEmail(user.correo); }
  }
}

function bindRecoveryEvents(){
  const r = state.recovery;
  const cancelBtn = document.getElementById('rc-cancel-btn');
  if(cancelBtn) cancelBtn.onclick = ()=>{ state.recovery = null; render(); };

  if(r.step==='find'){
    document.getElementById('rc-find-btn').onclick = ()=>{
      const usuario = val('rc-usuario').trim();
      const user = state.users.find(u=>u.usuario.toLowerCase()===usuario.toLowerCase());
      if(!user){ r.usuario = usuario; r.error = 'No existe ese usuario.'; render(); return; }
      if(!user.correo && !(user.pregunta && user.respuesta)){ r.usuario = usuario; r.error = 'Este usuario no tiene correo ni pregunta de seguridad configurados. Pide a un administrador que le restablezca la contraseña desde la sección Usuarios.'; render(); return; }
      state.recovery = {step:'choose', usuario, user, error:''};
      render();
    };
  }
  if(r.step==='choose'){
    const emailBtn = document.getElementById('rc-email-btn');
    if(emailBtn) emailBtn.onclick = ()=> sendRecoveryEmail(r.user);
    const questionBtn = document.getElementById('rc-question-btn');
    if(questionBtn) questionBtn.onclick = ()=>{ state.recovery = {step:'answer', usuario:r.usuario, user:r.user, error:''}; render(); };
  }
  if(r.step==='answer'){
    document.getElementById('rc-answer-btn').onclick = ()=>{
      const resp = val('rc-respuesta').trim().toLowerCase();
      if(resp !== r.user.respuesta.trim().toLowerCase()){ r.error = 'Respuesta incorrecta.'; render(); return; }
      state.recovery = {step:'reset', usuario:r.usuario, user:r.user, error:''};
      render();
    };
  }
  if(r.step==='reset'){
    document.getElementById('rc-reset-btn').onclick = async ()=>{
      const p1 = val('rc-pass1'), p2 = val('rc-pass2');
      const errEl = document.getElementById('rc-error');
      if(!p1){ errEl.textContent = 'Ingresa la nueva contraseña.'; return; }
      if(p1!==p2){ errEl.textContent = 'Las contraseñas no coinciden.'; return; }
      const idx = state.users.findIndex(u=>u.id===r.user.id);
      if(idx>=0){ state.users[idx].password = p1; await saveUsers(); }
      state.recovery = null;
      state.loginForm = {usuario:r.usuario, password:'', error:''};
      alert('Contraseña actualizada. Ya puedes iniciar sesión.');
      render();
    };
  }
}

/* ---------------- CARTERA DE CLIENTES ---------------- */
function ordersForClient(cliente){
  const phoneDigits = (cliente.telefono||'').replace(/\D/g,'');
  return state.orders.filter(o=>{
    if(o.clienteId && o.clienteId===cliente.id) return true;
    if(!o.clienteId){
      const oPhone = (o.cliente.telefono||'').replace(/\D/g,'');
      if(phoneDigits && oPhone && oPhone===phoneDigits) return true;
      if(!phoneDigits && !oPhone && o.cliente.nombre && cliente.nombre && o.cliente.nombre.trim().toLowerCase()===cliente.nombre.trim().toLowerCase()) return true;
    }
    return false;
  }).sort((a,b)=>b.createdAt-a.createdAt);
}

function renderClientes(){
  const q = state.clienteSearchQuery.trim().toLowerCase();
  let lista = state.clientes.map(c=>{
    const ordenes = ordersForClient(c);
    const totalFacturado = ordenes.reduce((a,o)=>a+orderTotal(o),0);
    const saldoPendiente = ordenes.reduce((a,o)=>a+orderSaldo(o),0);
    return {cliente:c, ordenes, totalFacturado, saldoPendiente};
  });
  if(q){
    lista = lista.filter(x => (x.cliente.nombre+' '+(x.cliente.telefono||'')+' '+(x.cliente.correo||'')).toLowerCase().includes(q));
  }
  lista.sort((a,b)=> a.cliente.nombre.localeCompare(b.cliente.nombre));

  return `
    <div style="display:flex;justify-content:space-between;gap:12px;margin-bottom:14px;flex-wrap:wrap;">
      <input id="cliente-search-input" placeholder="Buscar cliente por nombre, teléfono o correo…" value="${state.clienteSearchQuery}" style="max-width:360px;">
      <button class="btn btn-primary" id="new-cliente-btn">+ Agregar cliente</button>
    </div>
    ${state.clientes.length===0 ? emptyState('Aún no tienes clientes registrados.','Agrega tus clientes para ver su historial de órdenes, cuánto han facturado y si tienen saldos pendientes.') : ''}
    ${state.clientes.length>0 && lista.length===0 ? emptyState('Sin resultados.','Prueba con otro término de búsqueda.') : ''}
    ${lista.map(x=>renderClienteCard(x)).join('')}
  `;
}

/* ---------------- CARTERA DE CRÉDITO ---------------- */
function diasDesde(fechaStr){
  if(!fechaStr) return null;
  const f = new Date(fechaStr+'T00:00:00');
  const hoy = new Date(todayStr()+'T00:00:00');
  return Math.round((hoy-f)/(1000*60*60*24));
}

  const porCliente = {};
  conSaldo.forEach(o=>{

      <tr><th>Cliente</th><th>Teléfono</th><th>Folio</th><th>Vehículo</th><th>Días</th><th>Total</th><th>Abono</th><th>Saldo</th><th></th></tr>
      ${conSaldo.map(o=>{
        const dias = diasDesde(o.fechaIngreso);

/* ---------------- REPORTES (solo admin) ---------------- */
const MESES_LARGO = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];

function buildReportData(){
  const porMes = {};
  const porTecnico = {};
  const porRepuesto = {};
  const porTipoTrabajo = {};
  Object.keys(TIPOS_TRABAJO).forEach(k=> porTipoTrabajo[k] = {horasTotales:0, piezas:0});

  let ingresosCompletados = 0;
  let ordenesCompletadas = 0;
  let ingresosTotales = 0;
  let saldoPendienteTotal = 0;

  state.orders.forEach(o=>{
    const total = orderTotal(o);
    ingresosTotales += total;

    const mesKey = (o.fechaIngreso||'').slice(0,7) || 'sin-fecha';
    if(!porMes[mesKey]) porMes[mesKey] = {count:0, total:0};
    porMes[mesKey].count++; porMes[mesKey].total += total;

    const tec = o.tecnico && o.tecnico.trim() ? o.tecnico.trim() : 'Sin asignar';
    if(!porTecnico[tec]) porTecnico[tec] = {count:0, total:0};
    porTecnico[tec].count++; porTecnico[tec].total += total;

    if(o.estado==='terminado' || o.estado==='entregado'){ ordenesCompletadas++; ingresosCompletados += total; }
    saldoPendienteTotal += orderSaldo(o);

    o.repuestos.forEach(r=>{
      if(!porRepuesto[r.nombre]) porRepuesto[r.nombre] = {cantidad:0, monto:0};
      porRepuesto[r.nombre].cantidad += Number(r.cantidad)||0;
      porRepuesto[r.nombre].monto += (Number(r.cantidad)||0) * (Number(r.precioUnitario)||0);
    });

    o.trabajos.forEach(t=>{
      const segTotal = t.procesos.reduce((a,p)=>a+(p.tiempoRealSeg||0),0);
      if(porTipoTrabajo[t.tipo]){ porTipoTrabajo[t.tipo].horasTotales += segTotal/3600; porTipoTrabajo[t.tipo].piezas += 1; }
    });
  });

  return {porMes, porTecnico, porRepuesto, porTipoTrabajo, ingresosTotales, ingresosCompletados, ordenesCompletadas, totalOrdenes: state.orders.length, saldoPendienteTotal};
}

function mesLabel(mesKey){
  if(mesKey==='sin-fecha') return 'Sin fecha';
  const [y,m] = mesKey.split('-');
  return MESES_LARGO[Number(m)-1] + ' ' + y;
}

  const repuestosOrdenados = Object.entries(rep.porRepuesto).sort((a,b)=>b[1].monto-a[1].monto).slice(0,10);

  if(state.orders.length===0){
    return emptyState('Todavía no hay datos para mostrar reportes.','Cuando registres órdenes de trabajo, aquí verás ingresos, técnicos y repuestos más usados.');

  return `

    </div>

    <h2 class="section-title">Ingresos por mes</h2>
    <div class="table-wrap" style="margin-bottom:24px;"><table>
      <tr><th>Mes</th><th>Órdenes</th><th>Ingresos</th></tr>
      ${mesesOrdenados.map(m=>`<tr><td>${mesLabel(m)}</td><td>${rep.porMes[m].count}</td><td>${fmtMoney(rep.porMes[m].total)}</td></tr>`).join('')}
    </table></div>

    <h2 class="section-title">Órdenes e ingresos por técnico</h2>
    <div class="table-wrap" style="margin-bottom:24px;"><table>
      <tr><th>Técnico</th><th>Órdenes</th><th>Ingresos generados</th></tr>
      ${tecnicosOrdenados.map(([tec,d])=>`<tr><td>${tec}</td><td>${d.count}</td><td>${fmtMoney(d.total)}</td></tr>`).join('')}
    </table></div>

    <h2 class="section-title">Repuestos más usados (top 10)</h2>
    ${repuestosOrdenados.length===0 ? '<div style="color:var(--text-dim);font-size:13px;margin-bottom:24px;">Aún no se han usado repuestos en ninguna orden.</div>' : `

      <tr><th>Tipo de trabajo</th><th>Piezas registradas</th><th>Horas totales</th><th>Promedio por pieza</th></tr>
      ${Object.entries(rep.porTipoTrabajo).map(([tipo,d])=>`
        <tr>
          <td>${TIPOS_TRABAJO[tipo].label}</td>
          <td>${d.piezas}</td>

        </tr>`).join('')}
    </table></div>

/* ---------------- EVENTS: content ---------------- */
function bindContentEvents(){
  document.querySelectorAll('[data-toggle]').forEach(el=>{
    el.onclick = ()=>{ const id = el.getAttribute('data-toggle'); state.openOrderIds.has(id)? state.openOrderIds.delete(id) : state.openOrderIds.add(id); render(); };
  });
  document.querySelectorAll('[data-toggle-cliente]').forEach(el=>{
    el.onclick = ()=>{ const id = el.getAttribute('data-toggle-cliente'); state.openClienteIds.has(id)? state.openClienteIds.delete(id) : state.openClienteIds.add(id); render(); };
  });
  const newOrderBtn = document.getElementById('new-order-btn');
  if(newOrderBtn) newOrderBtn.onclick = ()=> openOrderModal(null);
  document.querySelectorAll('[data-edit]').forEach(el=> el.onclick = (e)=>{ e.stopPropagation(); openOrderModal(el.getAttribute('data-edit')); });
  document.querySelectorAll('[data-pdf]').forEach(el=> el.onclick = (e)=>{ e.stopPropagation(); const o = state.orders.find(x=>x.id===el.getAttribute('data-pdf')); if(o) generateOrderPDF(o); });
  document.querySelectorAll('[data-notify]').forEach(el=> el.onclick = (e)=>{ e.stopPropagation(); const o = state.orders.find(x=>x.id===el.getAttribute('data-notify')); if(o) notifyClientWhatsApp(o); });
  document.querySelectorAll('[data-del]').forEach(el=> el.onclick = async (e)=>{
    e.stopPropagation();
    if(confirm('¿Eliminar esta orden de trabajo? Esta acción no se puede deshacer.')){
      const ordId = el.getAttribute('data-del');
      const ord = state.orders.find(o=>o.id===ordId);
      if(ord) for(const t of ord.trabajos) if(t.tieneFoto) await deletePhotoKey(t.id);
      state.orders = state.orders.filter(o=>o.id!==ordId);
      await saveOrders();
      render();
    }
  });

  const newItemBtn = document.getElementById('new-item-btn');
  if(newItemBtn) newItemBtn.onclick = ()=> openInventoryModal(null);
  document.querySelectorAll('[data-edit-item]').forEach(el=> el.onclick = ()=> openInventoryModal(el.getAttribute('data-edit-item')));
  document.querySelectorAll('[data-del-item]').forEach(el=> el.onclick = async ()=>{ if(confirm('¿Eliminar este repuesto del inventario?')){ state.inventory = state.inventory.filter(i=>i.id!==el.getAttribute('data-del-item')); await saveInventory(); render(); } });

  const searchInput = document.getElementById('search-input');
  if(searchInput){
    searchInput.oninput = ()=>{ state.searchQuery = searchInput.value; render(); setTimeout(()=>{ const el=document.getElementById('search-input'); if(el){ el.focus(); el.selectionStart=el.selectionEnd=el.value.length; } },0); };
  }
  document.querySelectorAll('[data-view-photo]').forEach(el=> el.onclick = ()=> viewPhoto(el.getAttribute('data-view-photo')));
  document.querySelectorAll('[data-open-order]').forEach(el=> el.onclick = ()=>{ state.tab='orders'; state.openOrderIds.add(el.getAttribute('data-open-order')); openOrderModal(el.getAttribute('data-open-order')); });

  const newUserBtn = document.getElementById('new-user-btn');
  if(newUserBtn) newUserBtn.onclick = ()=> openUserModal(null);
  document.querySelectorAll('[data-edit-user]').forEach(el=> el.onclick = ()=> openUserModal(el.getAttribute('data-edit-user')));
  document.querySelectorAll('[data-del-user]').forEach(el=> el.onclick = async ()=>{
    const id = el.getAttribute('data-del-user');
    const target = state.users.find(u=>u.id===id);
    if(target.rol==='admin' && state.users.filter(u=>u.rol==='admin').length<=1){ alert('Debe existir al menos un usuario administrador.'); return; }
    if(confirm('¿Eliminar a '+target.nombre+'?')){ state.users = state.users.filter(u=>u.id!==id); await saveUsers(); render(); }
  });

  const newClienteBtn = document.getElementById('new-cliente-btn');
  if(newClienteBtn) newClienteBtn.onclick = ()=> openClienteModal(null);
  document.querySelectorAll('[data-edit-cliente]').forEach(el=> el.onclick = (e)=>{ e.stopPropagation(); openClienteModal(el.getAttribute('data-edit-cliente')); });
  document.querySelectorAll('[data-del-cliente]').forEach(el=> el.onclick = async (e)=>{
    e.stopPropagation();
    if(confirm('¿Eliminar este cliente de la cartera? Sus órdenes existentes no se borran.')){
      state.clientes = state.clientes.filter(c=>c.id!==el.getAttribute('data-del-cliente'));
      await saveClientes();
      render();
    }
  });
  const clienteSearchInput = document.getElementById('cliente-search-input');
  if(clienteSearchInput){
    clienteSearchInput.oninput = ()=>{ state.clienteSearchQuery = clienteSearchInput.value; render(); setTimeout(()=>{ const el=document.getElementById('cliente-search-input'); if(el){ el.focus(); el.selectionStart=el.selectionEnd=el.value.length; } },0); };
  }

  document.querySelectorAll('[data-registrar-abono]').forEach(el=> el.onclick = ()=>{
    const order = state.orders.find(o=>o.id===el.getAttribute('data-registrar-abono'));
    if(order) { state.modal = {type:'abono', draft:{order}}; render(); }
  });
}

async function onResetData(){
  if(!state.currentUser || state.currentUser.rol!=='admin'){ alert('Solo un usuario administrador puede borrar todos los datos.'); return; }
  if(confirm('Esto borrará todas las órdenes e inventario guardados. ¿Continuar?')){
    state.orders=[]; state.inventory=[]; state.counters={order:0};
    await saveOrders(); await saveInventory(); await saveCounters();
    render();
  }
}

/* ---------------- ORDER MODAL ---------------- */
function blankOrder(){
  state.counters.order += 1;
  return {
    id: uid(),
    folio: 'OT-' + String(state.counters.order).padStart(4,'0'),
    cliente:{nombre:'', telefono:''},
    clienteId: null,
    vehiculo:{marca:'', modelo:'', anio:'', motor:''},
    tecnico:'',
    ubicacion:'',
    fechaIngreso: todayStr(),
    fechaEntrega:'',
    estado:'pendiente',
    trabajos:[],
    repuestos:[],
    manoObra:0,
    abono:0,
    notas:'',
    createdAt: Date.now()
  };
}

function openOrderModal(id){
  let draft;
  if(id){
    const existing = state.orders.find(o=>o.id===id);
    draft = JSON.parse(JSON.stringify(existing));
  } else {
    draft = blankOrder();
  }
  state.modal = {type:'order', draft, editingId:id};
  render();
}

function openInventoryModal(id){
  let draft;
  if(id){
    draft = JSON.parse(JSON.stringify(state.inventory.find(i=>i.id===id)));
  } else {
    draft = {id:uid(), codigo:'', nombre:'', categoria:'General', stock:0, stockMinimo:0, precioUnitario:0, proveedor:'', unidad:'u'};
  }
  state.modal = {type:'inventory', draft, editingId:id};
  render();
}

function openUserModal(id){
  let draft;
  if(id){
    draft = JSON.parse(JSON.stringify(state.users.find(u=>u.id===id)));
    draft.password = '';
  } else {
    draft = {id:uid(), nombre:'', usuario:'', password:'', rol:'tecnico', pregunta:PREGUNTAS_SEGURIDAD[0], respuesta:'', correo:''};
  }
  state.modal = {type:'user', draft, editingId:id};
  render();
}

function closeModal(){ state.modal=null; render(); }

function renderModal(){
  if(state.modal.type==='order') return renderOrderModal();
  if(state.modal.type==='inventory') return renderInventoryModal();
  if(state.modal.type==='user') return renderUserModal();
  if(state.modal.type==='taller') return renderTallerModal();
  if(state.modal.type==='cliente') return renderClienteModal();
  if(state.modal.type==='abono') return renderAbonoModal();
  if(state.modal.type==='photo') return renderPhotoModal();
  return '';
}

        <select id="fu-pregunta">${PREGUNTAS_SEGURIDAD.map(p=>`<option ${d.pregunta===p?'selected':''}>${p}</option>`).join('')}</select>
      </div>
      <div class="field" style="margin-bottom:10px;"><label>Respuesta</label><input id="fu-respuesta" value="${d.respuesta||''}"></div>
      <div class="field" style="margin-bottom:14px;"><label>Rol</label>
        <select id="fu-rol" ${isSelf?'disabled title="No puedes cambiar tu propio rol"':''}>
          <option value="tecnico" ${d.rol==='tecnico'?'selected':''}>Técnico</option>
          <option value="admin" ${d.rol==='admin'?'selected':''}>Administrador</option>
        </select>
        ${isSelf? '<div style="font-size:11px;color:var(--text-dim);margin-top:4px;">No puedes cambiar tu propio rol.</div>':''}
      </div>
      <div id="fu-error" class="auth-error"></div>
      <div class="modal-actions">
        <button class="btn" id="modal-cancel">Cancelar</button>
        <button class="btn btn-primary" id="modal-save-user">Guardar usuario</button>
      </div>
    </div>
  </div>`;
}

/* ---------------- MODAL EVENTS ---------------- */
function bindModalEvents(){
  if(!state.modal) return;
  const closeEls = [document.getElementById('modal-close'), document.getElementById('modal-cancel')];
  closeEls.forEach(el=> el && (el.onclick = closeModal));
  const backdrop = document.getElementById('modal-backdrop');
  if(backdrop) backdrop.onclick = (e)=>{ if(e.target===backdrop) closeModal(); };

  if(state.modal.type==='order') bindOrderModalEvents();
  if(state.modal.type==='inventory') bindInventoryModalEvents();
  if(state.modal.type==='user') bindUserModalEvents();
  if(state.modal.type==='taller') bindTallerModalEvents();
  if(state.modal.type==='cliente') bindClienteModalEvents();
  if(state.modal.type==='abono') bindAbonoModalEvents();
}

function readOrderFormIntoDraft(){
  const d = state.modal.draft;
  d.cliente.nombre = val('f-cliente'); d.cliente.telefono = val('f-telefono');
  d.tecnico = val('f-tecnico'); d.estado = val('f-estado');
  d.vehiculo.marca = val('f-marca'); d.vehiculo.modelo = val('f-modelo');
  d.vehiculo.motor = val('f-motor'); d.vehiculo.anio = val('f-anio');
  d.fechaIngreso = val('f-fingreso'); d.fechaEntrega = val('f-fentrega');
  d.ubicacion = val('f-ubicacion');
  d.manoObra = Number(val('f-manoobra'))||0; d.notas = val('f-notas');
  d.abono = Number(val('f-abono'))||0;
}
function val(id){ const el = document.getElementById(id); return el ? el.value : ''; }

function bindOrderModalEvents(){
  const d = state.modal.draft;

  const clienteSelect = document.getElementById('f-cliente-select');
  if(clienteSelect) clienteSelect.onchange = ()=>{
    readOrderFormIntoDraft();
    const selId = clienteSelect.value;
    if(selId){
      const c = state.clientes.find(x=>x.id===selId);
      if(c){ d.clienteId = c.id; d.cliente.nombre = c.nombre; d.cliente.telefono = c.telefono||''; }
    } else {
      d.clienteId = null;
    }
    render();
  };

  document.querySelectorAll('[data-add-trabajo]').forEach(el=>{
    el.onclick = ()=>{
      readOrderFormIntoDraft();
      const tipo = el.getAttribute('data-add-trabajo');
      d.trabajos.push({
        id: uid(), tipo, ubicacion:'', medidas:'', tieneFoto:false,
        procesos: TIPOS_TRABAJO[tipo].procesos.map(nombre=>({nombre, tiempoEstimadoMin:30, tiempoRealSeg:0, estado:'pendiente', timerStart:null}))
      });
      render();
    };
  });
  document.querySelectorAll('[data-rm-trabajo]').forEach(el=>{
    el.onclick = async ()=>{
      readOrderFormIntoDraft();
      const ti = Number(el.getAttribute('data-rm-trabajo'));
      const removed = d.trabajos[ti];
      if(removed.tieneFoto) await deletePhotoKey(removed.id);
      d.trabajos.splice(ti,1);
      render();
    };
  });
  document.querySelectorAll('[data-ubicacion]').forEach(el=>{
    el.oninput = ()=>{ d.trabajos[Number(el.getAttribute('data-ubicacion'))].ubicacion = el.value; };
  });
  document.querySelectorAll('[data-medidas]').forEach(el=>{
    el.oninput = ()=>{ d.trabajos[Number(el.getAttribute('data-medidas'))].medidas = el.value; };
  });
  document.querySelectorAll('[data-view-photo]').forEach(el=>{
    el.onclick = ()=> viewPhoto(el.getAttribute('data-view-photo'));
  });
  document.querySelectorAll('[data-photo-input]').forEach(el=>{
    el.onchange = ()=>{
      readOrderFormIntoDraft();
      const ti = Number(el.getAttribute('data-photo-input'));
      const file = el.files[0];
      if(!file) return;
      const trabajo = d.trabajos[ti];
      compressImageFile(file, (dataUrl)=>{
        state.pendingPhotos[trabajo.id] = dataUrl;
        trabajo.tieneFoto = true;
        render();
      });
    };
  });
  document.querySelectorAll('[data-photo-remove]').forEach(el=>{
    el.onclick = async ()=>{
      readOrderFormIntoDraft();
      const ti = Number(el.getAttribute('data-photo-remove'));
      const trabajo = d.trabajos[ti];
      await deletePhotoKey(trabajo.id);
      trabajo.tieneFoto = false;
      render();
    };
  });
  document.querySelectorAll('[data-est-min]').forEach(el=>{
    el.onchange = ()=>{ readOrderFormIntoDraft(); const [ti,pi]=el.getAttribute('data-est-min').split(':').map(Number); d.trabajos[ti].procesos[pi].tiempoEstimadoMin = Number(el.value)||0; render(); };
  });
  document.querySelectorAll('[data-proc-estado]').forEach(el=>{
    el.onchange = ()=>{ readOrderFormIntoDraft(); const [ti,pi]=el.getAttribute('data-proc-estado').split(':').map(Number); d.trabajos[ti].procesos[pi].estado = el.value; render(); };
  });
  document.querySelectorAll('[data-start-timer]').forEach(el=>{
    el.onclick = ()=>{ readOrderFormIntoDraft(); const [ti,pi]=el.getAttribute('data-start-timer').split(':').map(Number); const p = d.trabajos[ti].procesos[pi]; p.timerStart = Date.now(); p.estado='en_proceso'; render(); };
  });
  document.querySelectorAll('[data-stop-timer]').forEach(el=>{
    el.onclick = ()=>{ readOrderFormIntoDraft(); const [ti,pi]=el.getAttribute('data-stop-timer').split(':').map(Number); const p = d.trabajos[ti].procesos[pi]; if(p.timerStart){ p.tiempoRealSeg += Math.round((Date.now()-p.timerStart)/1000); p.timerStart=null; } render(); };
  });
  document.querySelectorAll('[data-rm-repuesto]').forEach(el=>{
    el.onclick = ()=>{
      readOrderFormIntoDraft();
      const idx = Number(el.getAttribute('data-rm-repuesto'));
      const r = d.repuestos[idx];
      const invItem = state.inventory.find(i=>i.id===r.inventoryId);
      if(invItem) invItem.stock = Number(invItem.stock) + Number(r.cantidad);
      d.repuestos.splice(idx,1);
      render();
    };
  });
  const addRepBtn = document.getElementById('add-repuesto-btn');
  if(addRepBtn) addRepBtn.onclick = ()=>{
    readOrderFormIntoDraft();
    const selId = val('f-repuesto-select');
    const cant = Number(val('f-repuesto-cant'))||0;
    if(!selId || cant<=0) return;
    const invItem = state.inventory.find(i=>i.id===selId);
    if(!invItem) return;
    if(Number(invItem.stock) < cant){ alert('Stock insuficiente. Disponible: '+invItem.stock+' '+invItem.unidad); return; }
    invItem.stock = Number(invItem.stock) - cant;
    d.repuestos.push({inventoryId:invItem.id, nombre:invItem.nombre, cantidad:cant, precioUnitario:Number(invItem.precioUnitario)});
    render();
  };

  const saveBtn = document.getElementById('modal-save');
  if(saveBtn) saveBtn.onclick = async ()=>{
    readOrderFormIntoDraft();
    if(!d.cliente.nombre.trim()){ alert('Ingresa el nombre del cliente.'); return; }
    const idx = state.orders.findIndex(o=>o.id===d.id);
    if(idx>=0) state.orders[idx] = d; else state.orders.push(d);
    await saveOrders();
    await saveInventory();
    await saveCounters();
    // Persistir fotos recién tomadas para las piezas de esta orden
    for(const t of d.trabajos){
      if(state.pendingPhotos[t.id]){
        try{ await window.storage.set('foto:'+t.id, state.pendingPhotos[t.id], false); state.photoCache[t.id] = state.pendingPhotos[t.id]; }catch(e){ console.error('Error guardando foto', e); }
        delete state.pendingPhotos[t.id];
      }
    }
    state.modal = null;
    render();
  };
}

function bindInventoryModalEvents(){
  const saveBtn = document.getElementById('modal-save-item');
  if(saveBtn) saveBtn.onclick = async ()=>{
    const d = state.modal.draft;
    d.codigo = val('fi-codigo'); d.nombre = val('fi-nombre'); d.categoria = val('fi-categoria');
    d.unidad = val('fi-unidad')||'u'; d.stock = Number(val('fi-stock'))||0; d.stockMinimo = Number(val('fi-stockmin'))||0;
    d.precioUnitario = Number(val('fi-precio'))||0; d.proveedor = val('fi-proveedor');
    if(!d.nombre.trim()){ alert('Ingresa el nombre del repuesto.'); return; }
    const idx = state.inventory.findIndex(i=>i.id===d.id);
    if(idx>=0) state.inventory[idx]=d; else state.inventory.push(d);
    await saveInventory();
    state.modal = null;
    render();
  };
}

function bindTallerModalEvents(){
  const d = state.modal.draft;
  const logoInput = document.getElementById('tl-logo-input');
  if(logoInput) logoInput.onchange = ()=>{
    const file = logoInput.files[0];
    if(!file) return;
    compressLogoFile(file, (dataUrl)=>{ d.logo = dataUrl; render(); });
  };
  const logoRemove = document.getElementById('tl-logo-remove');
  if(logoRemove) logoRemove.onclick = ()=>{ d.logo = ''; render(); };

  const saveBtn = document.getElementById('modal-save-taller');
  if(saveBtn) saveBtn.onclick = async ()=>{
    state.taller = {
      nombre: val('tl-nombre').trim() || 'RectiMotor',
      telefono: val('tl-telefono').trim(),
      correo: val('tl-correo').trim(),
      direccion: val('tl-direccion').trim(),
      identificacion: val('tl-identificacion').trim(),
      codigoPais: val('tl-codigopais').trim(),
      logo: d.logo || ''
    };
    await saveTaller();
    state.modal = null;
    render();
  };
}

function bindUserModalEvents(){
  const saveBtn = document.getElementById('modal-save-user');
  if(saveBtn) saveBtn.onclick = async ()=>{
    const d = state.modal.draft;
    const errEl = document.getElementById('fu-error');
    const nombre = val('fu-nombre').trim();
    const usuario = val('fu-usuario').trim();
    const nuevaPass = val('fu-password');
    const rol = val('fu-rol');
    const isSelf = state.modal.editingId===state.currentUser.id;

    if(!nombre || !usuario){ errEl.textContent = 'Completa nombre y usuario.'; return; }
    if(!state.modal.editingId && !nuevaPass){ errEl.textContent = 'Ingresa una contraseña.'; return; }
    const respuesta = val('fu-respuesta').trim();
    const pregunta = val('fu-pregunta');
    if(!respuesta){ errEl.textContent = 'Ingresa una respuesta a la pregunta de seguridad.'; return; }
    const dup = state.users.find(u => u.usuario.toLowerCase()===usuario.toLowerCase() && u.id!==d.id);
    if(dup){ errEl.textContent = 'Ese nombre de usuario ya existe.'; return; }

    const finalRol = isSelf ? d.rol : rol;
    if(state.modal.editingId){
      const wasAdmin = state.users.find(u=>u.id===d.id).rol==='admin';
      if(wasAdmin && finalRol!=='admin' && state.users.filter(u=>u.rol==='admin').length<=1){
        errEl.textContent = 'Debe existir al menos un usuario administrador.'; return;
      }
    }

    d.nombre = nombre; d.usuario = usuario; d.rol = finalRol;
    d.pregunta = pregunta; d.respuesta = respuesta;
    d.correo = val('fu-correo').trim();
    if(nuevaPass) d.password = nuevaPass;
    else if(state.modal.editingId){ const existing = state.users.find(u=>u.id===d.id); d.password = existing.password; }

    const idx = state.users.findIndex(u=>u.id===d.id);
    if(idx>=0) state.users[idx]=d; else state.users.push(d);
    await saveUsers();
    if(isSelf) state.currentUser = d;
    state.modal = null;
    render();
  };
}

/* ---------------- INIT ---------------- */
(async function init(){
  render();
  await loadAll();
  render();

  if(SUPABASE_CONFIGURADO){
    setInterval(async ()=>{
      // Solo sincroniza en segundo plano si no hay un modal abierto (para no interrumpir una edición)
      // y si ya se inició sesión (para no pisar la pantalla de login/config inicial).
      if(state.currentUser && !state.modal){
        await syncFromServer();
        render();
      }
    }, SUPABASE_POLL_MS);
  }
})();
</script>
</body>
</html>
